<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026北京车展数据平台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>

/* ═══════════════════════════════════════════════════════
   CSS Custom Properties & Reset
   ═══════════════════════════════════════════════════════ */
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1e293b;
  --border: #1e293b;
  --border-light: #334155;
  --primary: #10b981;
  --primary-light: #34d399;
  --primary-dark: #059669;
  --secondary: #3b82f6;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #a855f7;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 80px;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10, 14, 26, 0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.header-top { display: flex; align-items: center; justify-content: center; height: 56px; }
.header h1 {
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--primary-light), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 1px;
}

/* Desktop Top Nav */
.desktop-nav { display: none; justify-content: center; gap: 4px; padding-bottom: 8px; }
.desktop-nav button {
  background: transparent; border: none; color: var(--text2); font-size: 14px;
  padding: 8px 20px; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
  position: relative; font-weight: 500;
}
.desktop-nav button:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.desktop-nav button.active { color: var(--primary-light); background: rgba(16, 185, 129, 0.1); }
.desktop-nav button.active::after {
  content: ""; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 24px; height: 3px; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 2px;
}

/* Mobile Bottom Tab Bar */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: rgba(17, 24, 39, 0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 6px 0 env(safe-area-inset-bottom, 8px);
}
.bottom-nav button {
  background: transparent; border: none; color: var(--text3); font-size: 10px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 4px 12px; border-radius: var(--radius-sm); transition: var(--transition);
}
.bottom-nav button .icon { font-size: 20px; line-height: 1; }
.bottom-nav button.active { color: var(--primary-light); }
.bottom-nav button.active .icon { transform: scale(1.1); }

/* Main Content */
.main { max-width: 1400px; margin: 0 auto; padding: 16px; }
.tab-content { display: none; animation: fadeIn 0.3s ease; }
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Stats Cards */
.stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  text-align: center; position: relative; overflow: hidden;
}
.stat-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--primary-light)); }
.stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--secondary), #60a5fa); }
.stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--amber), #fbbf24); }
.stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--purple), #c084fc); }
.stat-card .num {
  font-size: 28px; font-weight: 800;
  background: linear-gradient(135deg, var(--primary-light), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.stat-card:nth-child(2) .num { background: linear-gradient(135deg, #60a5fa, var(--secondary)); -webkit-background-clip: text; background-clip: text; }
.stat-card:nth-child(3) .num { background: linear-gradient(135deg, #fbbf24, var(--amber)); -webkit-background-clip: text; background-clip: text; }
.stat-card:nth-child(4) .num { background: linear-gradient(135deg, #c084fc, var(--purple)); -webkit-background-clip: text; background-clip: text; }
.stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* Filters & Search */
.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
.filters input[type="text"], .filters select {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; outline: none; transition: var(--transition);
}
.filters input[type="text"]:focus, .filters select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }
.filters input[type="text"]::placeholder { color: var(--text3); }
.search-box { margin-bottom: 16px; }
.search-box input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 10px 16px; border-radius: var(--radius); font-size: 14px; outline: none; transition: var(--transition);
}
.search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }
.search-box input::placeholder { color: var(--text3); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; border: none; padding: 8px 16px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--transition); white-space: nowrap;
}
.btn:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-outline { background: transparent; border: 1px solid var(--border-light); color: var(--text2); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary-light); background: rgba(16, 185, 129, 0.08); }
.btn-danger { background: linear-gradient(135deg, var(--red), #dc2626); }
.btn-secondary { background: linear-gradient(135deg, var(--secondary), #2563eb); }

/* Brand Filter Chips */
.brand-chips {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.brand-chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px; background: var(--surface);
  border: 1px solid var(--border); color: var(--text2); font-size: 12px;
  cursor: pointer; transition: var(--transition); white-space: nowrap;
}
.chip:hover, .chip.active { background: rgba(16, 185, 129, 0.15); border-color: var(--primary); color: var(--primary-light); }

/* Vehicle Cards Grid */
.vehicle-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
.v-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 16px 16px 20px; cursor: pointer; transition: var(--transition); position: relative; overflow: hidden;
}
.v-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: linear-gradient(180deg, var(--primary), var(--secondary));
  border-radius: 4px 0 0 4px;
}
.v-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(16,185,129,0.15); }
.v-card .v-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.v-card .v-brand { font-size: 13px; font-weight: 700; color: var(--primary-light); }
.v-card .v-model { font-size: 17px; font-weight: 700; margin-top: 1px; color: var(--text); }
.v-card .v-cat { font-size: 11px; color: var(--text3); margin-top: 3px; }
.v-card .v-attr-badge {
  flex-shrink: 0; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
  white-space: nowrap; margin-top: 2px;
}
.v-card .v-attr-badge.debut { background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(239,68,68,0.15)); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
.v-card .v-attr-badge.first { background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(6,182,212,0.15)); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.v-card .v-attr-badge.normal { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
.v-card .v-highlights {
  margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px;
}
.v-card .v-hl-tag {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 4px 9px; border-radius: 6px; font-size: 11px; font-weight: 500;
  line-height: 1.4; transition: var(--transition);
}
.v-card .v-hl-tag .hl-icon { font-size: 12px; line-height: 1; }
.v-card .v-hl-tag.hl-drive { background: rgba(168,85,247,0.12); color: #c084fc; border: 1px solid rgba(168,85,247,0.2); }
.v-card .v-hl-tag.hl-range { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
.v-card .v-hl-tag.hl-power { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
.v-card .v-hl-tag.hl-design { background: rgba(236,72,153,0.12); color: #f472b6; border: 1px solid rgba(236,72,153,0.2); }
.v-card .v-hl-tag.hl-cabin { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
.v-card .v-hl-tag.hl-platform { background: rgba(6,182,212,0.12); color: #22d3ee; border: 1px solid rgba(6,182,212,0.2); }
.v-card .v-hl-tag.hl-price { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
.v-card .v-hl-tag.hl-space { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); }
.v-card .v-hl-tag.hl-default { background: rgba(100,116,139,0.12); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }
.v-card .v-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }

/* Tags */
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; line-height: 1.5; }
.tag-teal { background: rgba(6,182,212,0.15); color: #22d3ee; }
.tag-green { background: rgba(16,185,129,0.15); color: #34d399; }
.tag-amber { background: rgba(245,158,11,0.15); color: #fbbf24; }
.tag-red { background: rgba(239,68,68,0.15); color: #f87171; }
.tag-blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
.tag-purple { background: rgba(168,85,247,0.15); color: #c084fc; }
.tag-pink { background: rgba(236,72,153,0.15); color: #f472b6; }

/* Pagination */
.pagination { display: flex; justify-content: center; gap: 4px; margin-top: 20px; flex-wrap: wrap; }
.pagination button {
  background: var(--surface); border: 1px solid var(--border); color: var(--text2);
  padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: var(--transition);
}
.pagination button:hover { border-color: var(--primary); color: var(--primary-light); }
.pagination button.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; border-color: transparent; }

/* Data Table */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
.table-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table-wrap th {
  background: var(--surface2); color: var(--text2); font-weight: 600; padding: 10px 12px;
  text-align: left; white-space: nowrap; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
}
.table-wrap th:hover { color: var(--primary-light); }
.table-wrap td {
  padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.table-wrap tr:hover td { background: rgba(16, 185, 129, 0.04); }
.table-wrap tr { cursor: pointer; transition: var(--transition); }

/* Charts Grid */
.charts-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
.chart-card {
  background: linear-gradient(135deg, rgba(17,24,39,0.8), rgba(30,41,59,0.6));
  border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  backdrop-filter: blur(10px);
}
.chart-card h3 {
  font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.chart-card canvas { width: 100% !important; max-height: 300px; }

/* Comparison */
.compare-selected { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; margin-bottom: 12px; }
.compare-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 4px;
  background: rgba(16, 185, 129, 0.15); border: 1px solid var(--primary); color: var(--primary-light);
  padding: 4px 10px; border-radius: 16px; font-size: 12px;
}
.compare-chip .remove { cursor: pointer; opacity: 0.7; font-size: 14px; line-height: 1; }
.compare-chip .remove:hover { opacity: 1; }
.compare-stack { display: flex; flex-direction: column; gap: 12px; }
.compare-vehicle-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.compare-vehicle-card h4 { font-size: 15px; color: var(--primary-light); margin-bottom: 8px; }
.compare-vehicle-card .field-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.compare-vehicle-card .field-row .fl { color: var(--text3); }
.compare-vehicle-card .field-row .fv { color: var(--text); text-align: right; max-width: 60%; }
.compare-table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
.compare-table-wrap table { width: 100%; border-collapse: collapse; font-size: 12px; }
.compare-table-wrap th, .compare-table-wrap td {
  padding: 8px 10px; border: 1px solid var(--border); text-align: left;
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.compare-table-wrap th { background: var(--surface2); color: var(--text2); font-weight: 600; position: sticky; left: 0; z-index: 2; }
.compare-table-wrap td:first-child { background: var(--surface); color: var(--text2); font-weight: 500; position: sticky; left: 0; z-index: 1; }

/* Hall Guide */
.zone-section { margin-bottom: 24px; }
.zone-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.zone-title .dot { width: 10px; height: 10px; border-radius: 50%; }
.hall-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.hall-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; cursor: pointer; transition: var(--transition);
}
.hall-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: var(--shadow); }
.hall-card.highlight { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
.hall-header { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
.hall-name { font-size: 20px; font-weight: 800; }
.hall-badges { display: flex; gap: 4px; }
.hall-img-wrap { overflow: hidden; aspect-ratio: 16/10; }
.hall-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
.hall-card:hover .hall-img-wrap img { transform: scale(1.05); }
.hall-brands { padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 4px; }
.hall-vehicles { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.hall-vehicles.show { max-height: 1000px; }
.hall-vehicles .veh-item {
  padding: 8px 12px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; cursor: pointer; transition: var(--transition); font-size: 12px;
}
.hall-vehicles .veh-item:hover { background: rgba(16,185,129,0.05); }
.hall-vehicles .veh-brand { color: var(--primary-light); font-weight: 600; min-width: 50px; }
.hall-vehicles .veh-name { color: var(--text); font-weight: 500; }
.hall-vehicles .veh-type { color: var(--text3); margin-left: auto; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500; background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.show { display: flex; }
.modal-content {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  max-width: 800px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 24px;
  position: relative; animation: modalIn 0.3s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.modal-close {
  position: absolute; top: 12px; right: 12px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: var(--transition); z-index: 10;
}
.modal-close:hover { background: var(--red); color: #fff; border-color: var(--red); }
.detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 12px; }
.detail-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
.detail-item .dl { font-size: 11px; color: var(--text3); }
.detail-item .dv { font-size: 13px; color: var(--text); margin-top: 2px; word-break: break-all; }

/* Fullscreen Hall Overlay */
.fs-overlay { position: fixed; inset: 0; z-index: 600; background: var(--bg); overflow-y: auto; display: none; }
.fs-overlay.show { display: block; }
.fs-inner { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }
.fs-inner h2 { margin-bottom: 16px; }
.fs-brands { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.fs-vehicles { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 16px; }
.fs-veh-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; cursor: pointer; transition: var(--transition);
}
.fs-veh-card:hover { border-color: var(--primary); transform: translateY(-1px); }
.fs-v-brand { color: var(--primary-light); font-size: 13px; font-weight: 600; }
.fs-v-name { color: var(--text); font-size: 15px; font-weight: 600; margin-top: 2px; }
.fs-v-detail { color: var(--text3); font-size: 12px; margin-top: 4px; }
.fs-close-btn {
  position: fixed; top: 16px; right: 16px; z-index: 610; background: var(--surface);
  border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 50%;
  font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* Back to Top */
.back-top {
  position: fixed; bottom: 90px; right: 16px; z-index: 150; width: 40px; height: 40px; border-radius: 50%;
  background: var(--primary); color: #fff; border: none; font-size: 18px; cursor: pointer;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); display: none; transition: var(--transition);
  align-items: center; justify-content: center;
}
.back-top:hover { transform: translateY(-2px); }

/* Empty State */
.empty-msg { text-align: center; color: var(--text3); padding: 40px 20px; font-size: 14px; }
.record-info { color: var(--text3); font-size: 12px; margin-top: 8px; text-align: center; }
.sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.5; }
.sort-arrow.active { opacity: 1; color: var(--primary-light); }

/* Mobile cards for data management */
.mobile-cards { display: flex; flex-direction: column; gap: 10px; }
.m-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px; cursor: pointer; transition: var(--transition);
}
.m-card:hover { border-color: var(--border-light); }
.m-card .mc-top { display: flex; justify-content: space-between; align-items: center; }
.m-card .mc-brand { color: var(--primary-light); font-weight: 600; font-size: 13px; }
.m-card .mc-model { font-weight: 600; font-size: 14px; margin-top: 2px; }
.m-card .mc-info { color: var(--text3); font-size: 12px; margin-top: 4px; }

/* Responsive: Tablet */
@media (min-width: 768px) {
  .stats-row { grid-template-columns: repeat(4, 1fr); }

// Data Persistence (localStorage)
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = 'bjAutoShow2026_data';
const STORAGE_VERSION_KEY = 'bjAutoShow2026_version';
const CURRENT_DATA_VERSION = 'v9';

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(VEHICLES));
    localStorage.setItem(STORAGE_VERSION_KEY, CURRENT_DATA_VERSION);
  } catch(e) {
    console.error('保存数据到 localStorage 失败:', e);
    showToast('⚠️ 数据保存失败，可能存储空间已满');
  }
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    const savedVersion = localStorage.getItem(STORAGE_VERSION_KEY);
    if (saved && savedVersion === CURRENT_DATA_VERSION) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) {
        // Clear and repopulate VEHICLES array (keep const reference)
        VEHICLES.length = 0;
        parsed.forEach(v => VEHICLES.push(v));
        // Deduplicate and rebuild search indexes
        const seen = new Set();
        const unique = [];
        VEHICLES.forEach(v => {
          const key = (v['品牌']||'') + '|' + (v['车型']||'');
          if(!seen.has(key)) {
            seen.add(key);
            unique.push(v);
          }
        });
        if(unique.length < VEHICLES.length) {
          VEHICLES.length = 0;
          unique.forEach(v => VEHICLES.push(v));
        }
        rebuildSearchIndex();
        console.log('已从 localStorage 恢复 ' + VEHICLES.length + ' 条数据');
        return true;
      }
    }
  } catch(e) {
    console.error('从 localStorage 读取数据失败:', e);
  }
  return false;
}

function resetToDefault() {
  if (!confirm('确定要恢复初始数据吗？\n\n所有自定义修改（包括新增、编辑、删除、导入的数据）将全部丢失，此操作不可撤销！')) return;
  try {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_VERSION_KEY);
    showToast('数据已重置，页面即将刷新...');
    setTimeout(() => location.reload(), 1000);
  } catch(e) {
    console.error('重置数据失败:', e);
    alert('重置数据失败: ' + e.message);
  }
}

function exportData() {
  const dataStr = JSON.stringify(VEHICLES, null, 2);
  const blob = new Blob([dataStr], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bjAutoShow2026_data_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 数据已导出');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('数据格式错误');
      VEHICLES.length = 0;
      imported.forEach(v => VEHICLES.push(v));
      // Deduplicate
      const seen = new Set();
      const unique = [];
      VEHICLES.forEach(v => {
        const key = (v['品牌']||'') + '|' + (v['车型']||'');
        if(!seen.has(key)) {
          seen.add(key);
          unique.push(v);
        }
      });
      if(unique.length < VEHICLES.length) {
        VEHICLES.length = 0;
        unique.forEach(v => VEHICLES.push(v));
      }
      VEHICLES.forEach((v, i) => { v['序号'] = String(i + 1); });
      rebuildSearchIndex();
      saveToStorage();
      refreshAll();
      showToast('✅ 已导入 ' + VEHICLES.length + ' 条数据');
    } catch(err) {
      showToast('⚠️ 导入失败：' + err.message);
    }
  };
  reader.readAsText(file);
}

function clearAllData() {
  if (!confirm('确定要清空所有数据吗？\n\n此操作将删除全部 ' + VEHICLES.length + ' 条车型记录，数据库将变为空。\n\n此操作不可撤销！')) return;
  try {
    VEHICLES.length = 0;
    saveToStorage();
    refreshAll();
    showToast('已清空所有数据');
  } catch(e) {
    console.error('清空数据失败:', e);
    alert('清空数据失败: ' + e.message);

// Deduplicate VEHICLES by brand+model (keep first occurrence)
(function dedupVehicles() {
  const seen = new Set();
  const unique = [];
  VEHICLES.forEach(v => {
    const key = (v['品牌']||'') + '|' + (v['车型']||'');
    if(!seen.has(key)) {
      seen.add(key);
      unique.push(v);
    }
  });
  if(unique.length < VEHICLES.length) {
    console.log('去重: 移除 ' + (VEHICLES.length - unique.length) + ' 条重复数据');
    VEHICLES.length = 0;
    unique.forEach(v => VEHICLES.push(v));
  }
})();

// Build search index for each vehicle
function rebuildSearchIndex() {
  VEHICLES.forEach(v => {
    const brand = v['品牌'] || '';
    const model = v['车型'] || '';
    // Look up aliases for exact brand first, then try parent brand substrings
    let aliases = BRAND_ALIASES[brand] ? [...BRAND_ALIASES[brand]] : [];
    for(const key of Object.keys(BRAND_ALIASES)) {
      if(key !== brand && brand.includes(key) && brand !== key) {
        aliases.push(...BRAND_ALIASES[key]);
      }
    }
    // Deduplicate aliases
    aliases = [...new Set(aliases)];
    const tokens = [
      brand, model, v['类别']||'', v['核心看点']||'', v['动力类型']||'', v['车展属性']||'', v['等级']||''
    ].join(' ').toLowerCase();
    const aliasStr = aliases.join(' ').toLowerCase();
    v._searchIndex = (tokens + ' ' + aliasStr).replace(/\s+/g, ' ').trim();
    v._aliasIndex = aliasStr;
  });
}
rebuildSearchIndex();

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function isNA(v) { return !v || v==="待上市公布" || v==="待公布" || v==="不涉及" || v==="未知"; }

function num(s) {
  if(!s || isNA(s)) return null;
  let str = String(s).trim();
  // Extract numbers associated with "km"
  let kmMatches = str.match(/(\d+(?:\.\d+)?)\s*km/gi);
  if(kmMatches) {
    let nums = kmMatches.map(m => parseFloat(m)).filter(n => n >= 10 && n <= 2500);
    if(nums.length) return Math.max(...nums);
  }
  // Extract numbers in reasonable range (50-2500) as fallback
  let allNums = str.match(/\d+(?:\.\d+)?/g);
  if(allNums) {
    let candidates = allNums.map(n => parseFloat(n)).filter(n => n >= 50 && n <= 2500);
    if(candidates.length) return Math.max(...candidates);
  }
  return null;
}

function getUnique(key) {
  const s = new Set();
  VEHICLES.forEach(v => { if(v[key] && !isNA(v[key])) s.add(v[key]); });
  return [...s];
}

function getUniqueAll(key) {
  const s = new Set();
  VEHICLES.forEach(v => { if(v[key]) s.add(v[key]); });
  return [...s];
}

/* Parse core highlights into categorized feature badges */
function parseHighlights(text) {
  if(!text) return [];
  const parts = text.split(/[，,、；;]/).map(s => s.trim()).filter(s => s.length > 0);
  const categories = [
    { keys: ['激光雷达','智驾','ADS','XNGP','NCA','L3','L4','自动泊车','辅助驾驶','Super Cruise','Momenta','天神之眼','猎鹰','乾崑'], icon: '🤖', cls: 'hl-drive' },

    { keys: ['马力','kW','电机','发动机','插混','增程','纯电','零百','破百','混动','THS','DM','Hi4','三电机','双电机'], icon: '⚡', cls: 'hl-power' },
    { keys: ['造型','蝶翼','方盒子','溜背','轿跑','猎装','设计','金色','配色','联名','限量','收藏'], icon: '🎨', cls: 'hl-design' },
    { keys: ['座舱','屏幕','芯片','鸿蒙','MB.OS','OS','零重力','座椅','音响','气囊','柏林','环抱'], icon: '🧠', cls: 'hl-cabin' },
    { keys: ['架构','平台','底盘','悬架','压铸','云辇','后轮转向','线控','EMB','主动悬架','魔毯','灵蜥','天行'], icon: '🏗️', cls: 'hl-platform' },
    { keys: ['万','起','售价','元','价格','抢订'], icon: '💰', cls: 'hl-price' },
    { keys: ['轴距','七座','六座','五座','座','空间','长轴'], icon: '🪑', cls: 'hl-space' }
  ];
  return parts.map(p => {
    for(const c of categories) {
      if(c.keys.some(k => p.includes(k))) return { text: p, icon: c.icon, cls: c.cls };
    }
    return { text: p, icon: '✨', cls: 'hl-default' };
  });
}

function openCompareModal() {
  if(compareList.length < 2) { alert('请至少选择2款车型进行对比'); return; }

  const fields = ['品牌','车型','类别','等级','车身类型','车展属性','动力类型','尺寸(mm)','轴距(mm)','电动机总功率(kW)','CLTC纯电续航(km)','综合续航(km)','电池类型','电池电量(kWh)','官方售价(万元)','核心看点'];
  const content = document.getElementById('compareContent');
  const isMobile = window.innerWidth < 768;

  let html = '<div style="margin-bottom:10px;font-size:13px;color:var(--text3)">对比 ' + compareList.length + ' 款车型 · <span style="color:var(--primary-light)">绿色加粗</span>为差异项</div>';
  html += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">';
  html += '<table class="compare-modal-table">';
  html += '<thead><tr><th>参数</th>';
  compareList.forEach(idx => {
    const v = VEHICLES[idx];
    html += '<th style="min-width:' + (isMobile ? '130px' : '160px') + ';text-align:center">' +
      '<div style="color:var(--primary-light);font-weight:600">' + esc(v['品牌']) + '</div>' +
      '<div style="font-size:13px;margin-top:2px">' + esc(v['车型']) + '</div>' +
      '<button class="btn btn-sm btn-outline" style="margin-top:6px;font-size:11px;padding:2px 10px" onclick="removeFromCompareModal('+idx+')">移除</button>' +
      '</th>';
  });
  html += '</tr></thead><tbody>';
  fields.forEach(f => {
    html += '<tr><td>' + esc(f) + '</td>';
    const vals = compareList.map(idx => VEHICLES[idx][f] || '--');
    const uniqueVals = new Set(vals);
    const allSame = uniqueVals.size === 1;
    compareList.forEach((idx, i) => {
      const v = VEHICLES[idx];
      const val = v[f] || '--';
      const isDiff = !allSame && vals.filter(x => x === val).length === 1;
      html += '<td class="' + (isDiff ? 'diff' : '') + '" style="text-align:center">' + esc(val) + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  content.innerHTML = html;
  document.getElementById('compareModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeCompareModal() {
  document.getElementById('compareModal').classList.remove('show');
  document.body.style.overflow = '';
}

function removeFromCompareModal(idx) {
  toggleCompare(idx);
  if(compareList.length >= 2) {
    openCompareModal();
  } else {
    closeCompareModal();
  }
}

function clearAllCompare() {
  compareList = [];
  filterCompare();
  closeCompareModal();
  updateCompareBadge();
}

function extractRangeNum(str) {
  const km = str.match(/(\d+(?:\.\d+)?)\s*km/gi);
  if(km) { const n=km.map(m=>parseFloat(m)).filter(x=>x>=10&&x<=2500); if(n.length) return Math.max(...n); }
  const bare = str.match(/(\d+(?:\.\d+)?)/g);
  if(bare) { const n=bare.map(x=>parseFloat(x)).filter(x=>x>=100&&x<=2500); if(n.length) return Math.max(...n); }
  return null;
}

function parseCLTCByType(cltcStr, powerType) {
  let evR=null, hyR=null;
  if(!cltcStr||isNA(cltcStr)) return {ev:null,hy:null};
  const segments = cltcStr.split(/[;；]/).map(s=>s.trim()).filter(Boolean);
  const pt=powerType||'';
  const ptEV=/纯电|纯电动/.test(pt), ptHy=/增程|混动|插电|HEV|油电|混合/.test(pt);

  segments.forEach(seg => {
    const sEV=/纯电(?:版)?|EV/i.test(seg), sHy=/DM-[ip]|插混(?:版)?|增程(?:版)?|混动|HEV|油电/i.test(seg);
    if(sEV&&sHy) {
      seg.split('/').forEach(sub => {
        const subEV=/纯电(?:版)?|EV/i.test(sub), subHy=/DM-[ip]|插混(?:版)?|增程(?:版)?|混动|HEV|油电/i.test(sub);
        const n=extractRangeNum(sub);
        if(n!==null){ if(subEV&&!subHy) evR=Math.max(evR||0,n); else if(subHy&&!subEV) hyR=Math.max(hyR||0,n); }
      });
    } else {
      const n=extractRangeNum(seg);
      if(n!==null){ if(sEV&&!sHy) evR=Math.max(evR||0,n); else if(sHy&&!sEV) hyR=Math.max(hyR||0,n);
        else{ if(ptEV&&!ptHy) evR=Math.max(evR||0,n); else if(ptHy) hyR=Math.max(hyR||0,n); else evR=Math.max(evR||0,n); }
      }
    }
  });
  return {ev:evR, hy:hyR};
}

function getMgFiltered() {
  const s = (document.getElementById('t3_search').value||'').toLowerCase();
  const b = document.getElementById('t3_brand').value;
  const t = document.getElementById('t3_type').value;
  const p = document.getElementById('t3_power').value;
  let result = VEHICLES.filter(v => {
    if(s && !(v['品牌'].toLowerCase().includes(s) || v['车型'].toLowerCase().includes(s) || (v['类别']&&v['类别'].toLowerCase().includes(s)))) return false;
    if(b && v['品牌']!==b) return false;
    if(t && v['车身类型']!==t) return false;
    if(p && v['动力类型']!==p) return false;
    return true;
  });
  if(mgSort.key) {
    result.sort((a,b) => {
      let va = a[mgSort.key] || '';
      let vb = b[mgSort.key] || '';
      if(va < vb) return mgSort.asc ? -1 : 1;
      if(va > vb) return mgSort.asc ? 1 : -1;
      return 0;
    });
  }
  return result;
}

function sortMg(key) {
  if(mgSort.key === key) mgSort.asc = !mgSort.asc;
  else { mgSort.key = key; mgSort.asc = true; }
  renderMgTable();
}

function renderMgTable() {
  const all = getMgFiltered();

  fields.forEach(f => {

    thtml += '<th onclick="sortMg(\''+f+'\')">' + esc(f) + ' <span class="sort-arrow ' + active + '">' + arrow + '</span></th>';

function exportCSV() {
  const all = getMgFiltered();
  const keys = Object.keys(all[0]).filter(k => !k.startsWith('_'));
  let csv = '\uFEFF' + keys.join(',') + '\n';
  all.forEach(v => {
    csv += keys.map(k => '"' + String(v[k]||'').replace(/"/g, '""') + '"').join(',') + '\n';
  });
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '2026北京车展数据.csv';
  a.click();
}

  wsData.push(TEMPLATE_FIELDS.map(f => sample[f] || ''));
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  // Set column widths
  ws['!cols'] = TEMPLATE_FIELDS.map(f => ({wch: Math.max(f.length * 2.2, 12)}));
  XLSX.utils.book_append_sheet(wb, ws, '车展数据模板');
  XLSX.writeFile(wb, '2026北京车展_导入模板.xlsx');
}

function handleDroppedFile(e) {
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (typeof XLSX === 'undefined') { alert('Excel组件加载中，请稍后重试'); return; }
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['xlsx','xls','csv'].includes(ext)) { alert('请选择 .xlsx / .xls / .csv 文件'); return; }
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (!rows.length) { alert('表格中没有数据'); return; }
      processImportRows(rows, file.name);
    } catch(err) { alert('文件解析失败: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function handleExcelFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (typeof XLSX === 'undefined') {
    alert('Excel组件加载中，请稍后重试');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (!rows.length) { alert('表格中没有数据'); return; }
      processImportRows(rows, file.name);
    } catch(err) {
      alert('文件解析失败: ' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function processImportRows(rows, fileName) {
  let added = 0, updated = 0, errors = [];
  const addedList = [];

  rows.forEach((row, i) => {
    const rowNum = i + 2; // Excel row number (1=header)
    // Map Excel column names to internal field names
    const entry = {};
    TEMPLATE_FIELDS.forEach(f => {
      const internalKey = FIELD_MAP[f] || f;
      const val = String(row[f] || '').trim();
      entry[internalKey] = val;
    });
    // Validate required fields
    if (!entry['品牌']) { errors.push('第' + rowNum + '行: 品牌为空，已跳过'); return; }
    if (!entry['车型']) { errors.push('第' + rowNum + '行: 车型为空，已跳过'); return; }
    // Check if vehicle already exists (match by 品牌+车型)
    const existIdx = VEHICLES.findIndex(v => v['品牌'] === entry['品牌'] && v['车型'] === entry['车型']);
    if (existIdx >= 0) {
      // Update existing
      const old = VEHICLES[existIdx];
      Object.keys(entry).forEach(k => {
        if (k !== '序号' && entry[k] && entry[k] !== old[k]) old[k] = entry[k];
      });
      updated++;
    } else {
      // Add new
      entry['序号'] = String(VEHICLES.length + 1);
      VEHICLES.push(entry);
      added++;
      addedList.push(entry['品牌'] + ' ' + entry['车型']);
    }
  });

  // Renumber all vehicles
  VEHICLES.forEach((v, i) => { v['序号'] = String(i + 1); });

  // Show result
  showImportResult({added, updated, errors, addedList, totalRows: rows.length, fileName});
  // Refresh all tabs
  renderTab3();
  renderTab0();
  drawAllCharts();
  // Save to localStorage
  saveToStorage();
}

function buildEditForm(data) {
  let html = '';
  EDIT_SECTIONS.forEach(section => {
    html += '<div class="edit-section">';
    html += '<div class="edit-section-title">' + section.title + '</div>';
    html += '<div class="edit-grid">';
    section.fields.forEach(f => {
      const val = data[f.key] || '';
      const fullClass = f.full ? ' full' : '';
      html += '<div class="edit-field' + fullClass + '">';
      html += '<label>' + esc(f.label) + (f.required ? ' <span style="color:var(--red)">*</span>' : '') + '</label>';
      if (f.type === 'textarea') {
        html += '<textarea id="ef_' + f.key + '" placeholder="' + esc(f.placeholder||'') + '">' + esc(val) + '</textarea>';
      } else if (f.type === 'select') {
        html += '<select id="ef_' + f.key + '">';
        html += '<option value="">请选择</option>';
        f.options.forEach(opt => {
          html += '<option value="' + esc(opt) + '"' + (val===opt?' selected':'') + '>' + esc(opt) + '</option>';
        });
        html += '</select>';
      } else {
        html += '<input type="text" id="ef_' + f.key + '" value="' + esc(val) + '" placeholder="' + esc(f.placeholder||'') + '">';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });
  return html;
}

function collectEditData() {
  const data = {};
  EDIT_SECTIONS.forEach(section => {
    section.fields.forEach(f => {
      const el = document.getElementById('ef_' + f.key);
      if (el) data[f.key] = el.value.trim();
    });
  });
  return data;
}

function saveEdit() {
  const data = collectEditData();
  // Validate
  if (!data['品牌'] || !data['车型']) {
    alert('品牌和车型为必填项');
    return;
  }
  const v = VEHICLES[currentEditIdx];
  if (!v) return;
  // Check if the edit would create a duplicate (different from current)
  const dupIdx = VEHICLES.findIndex((vv, ii) => ii !== currentEditIdx && vv['品牌'] === data['品牌'] && vv['车型'] === data['车型']);
  if(dupIdx >= 0) {
    alert('无法保存：该品牌+车型组合已存在');
    return;
  }
  // Update all fields
  EDIT_SECTIONS.forEach(s => s.fields.forEach(f => {
    v[f.key] = data[f.key];
  }));
  closeEditModal();
  refreshAll();
  // Show brief feedback
  showToast('✅ 已保存修改：' + data['品牌'] + ' ' + data['车型']);
  saveToStorage();
}

function saveAdd() {
  const data = collectEditData();
  if (!data['品牌'] || !data['车型']) {
    alert('品牌和车型为必填项');
    return;
  }
  // Check for duplicate
  const dupIdx = VEHICLES.findIndex(v => v['品牌'] === data['品牌'] && v['车型'] === data['车型']);
  if(dupIdx >= 0) {
    if(!confirm('该车型已存在，是否覆盖？\n\n' + data['品牌'] + ' ' + data['车型'])) return;
    // Update existing instead of adding new
    EDIT_SECTIONS.forEach(s => s.fields.forEach(f => {
      if(data[f.key]) VEHICLES[dupIdx][f.key] = data[f.key];
    }));
    closeEditModal();
    refreshAll();
    showToast('✅ 已更新车型：' + data['品牌'] + ' ' + data['车型']);
    saveToStorage();
    return;
  }
  // Create new entry
  const entry = { '序号': String(VEHICLES.length + 1) };
  EDIT_SECTIONS.forEach(s => s.fields.forEach(f => {
    entry[f.key] = data[f.key];
  }));
  VEHICLES.push(entry);
  // Renumber
  VEHICLES.forEach((v, i) => { v['序号'] = String(i + 1); });
  closeEditModal();
  refreshAll();
  showToast('✅ 已添加新车型：' + data['品牌'] + ' ' + data['车型']);
  saveToStorage();
}

function setT4Mode(mode) {
  t4SearchMode = mode;
  document.querySelectorAll('.t4-pill').forEach(p => p.classList.toggle('active', p.dataset.mode === mode));
  searchHall();
}

function searchHall() {
  const searchInput = document.getElementById('t4_search');
  const resultsEl = document.getElementById('t4_results');
  if(!searchInput || !resultsEl) return; // Guard: elements not ready
  const q = searchInput.value.trim();
  t4LastQuery = q;

  if(!q) {
    resultsEl.innerHTML = '';
    document.querySelectorAll('.hall-card').forEach(c => { c.classList.remove('dimmed','matched'); });
    return;
  }

  const qLower = q.toLowerCase();
  const qParts = qLower.split(/\s+/).filter(p => p.length > 0);

  // Search vehicles
  const matchedVehicles = [];
  VEHICLES.forEach((v, idx) => {
    const brand = (v['品牌']||'').toLowerCase();
    const model = (v['车型']||'').toLowerCase();
    const category = (v['类别']||'').toLowerCase();
    const feature = (v['核心看点']||'').toLowerCase();
    const sIdx = v._searchIndex || '';
    const aliases = v._aliasIndex || '';

    let score = 0;

    // Mode-based scoring
    if(t4SearchMode === 'brand') {
      if(brand === qLower) score = 100;
      else if(brand.includes(qLower)) score = 80;
      else if(aliases.includes(qLower)) score = 70;
    } else if(t4SearchMode === 'model') {
      if(model === qLower) score = 100;
      else if(model.includes(qLower)) score = 80;
      else if(category.includes(qLower)) score = 60;
    } else if(t4SearchMode === 'feature') {
      if(feature.includes(qLower)) score = 90;
      else if(sIdx.includes(qLower)) score = 50;
    } else {
      // 'all' mode: multi-field fuzzy search
      if(brand === qLower || model === qLower) score = 100;
      else if(brand.includes(qLower) || model.includes(qLower)) score = 85;
      else if(aliases.includes(qLower)) score = 75;
      else if(sIdx.includes(qLower)) score = 60;
      else if(feature.includes(qLower)) score = 50;
    }

    // Multi-word AND matching boost
    if(qParts.length > 1) {
      const allMatch = qParts.every(p => sIdx.includes(p) || brand.includes(p) || model.includes(p));
      if(allMatch) score = Math.max(score, 65);
    }

    if(score > 0) {
      matchedVehicles.push({ v, idx, score, hall: v._hall || '待定' });
    }
  });

  // Sort by score
  matchedVehicles.sort((a,b) => b.score - a.score);

  // Group by hall
  const hallMatches = {};
  matchedVehicles.forEach(m => {
    if(!hallMatches[m.hall]) hallMatches[m.hall] = [];
    hallMatches[m.hall].push(m);
  });

  // Dim all hall cards, highlight matched ones
  document.querySelectorAll('.hall-card').forEach(card => {
    const hid = card.dataset.hall;
    if(hallMatches[hid]) {
      card.classList.remove('dimmed');
      card.classList.add('matched');
    } else {
      card.classList.add('dimmed');
      card.classList.remove('matched');
    }
  });

  // Render hall-based results
  let html = '<div class="t4-results">';
  html += '<div class="t4-results-header">';
  html += '<span class="t4-results-title">🏢 搜索结果 - 相关展厅</span>';
  html += '<span class="t4-results-count">' + Object.keys(hallMatches).length + ' 个展厅 · ' + matchedVehicles.length + ' 款车型</span>';
  html += '<button class="t4-results-clear" onclick="clearT4Search()">清除搜索</button>';
  html += '</div>';

  if(matchedVehicles.length === 0) {
    html += '<div class="empty-msg">未找到匹配结果，试试其他关键词</div>';
  } else {
    // Show hall cards with matched vehicles
    const hallList = Object.entries(hallMatches).sort((a,b) => b[1].length - a[1].length);
    hallList.forEach(([h, items]) => {
      const info = HALL_INFO[h] || {};
      const brands = HALL_BRANDS[h] || [];
      const color = ZONE_COLORS_MAP[h[0]] || '#666';
      const imgSrc = HALL_IMAGES[h] || '';
      const zoneName = info.zone || '';
      html += '<div class="hall-card t4-result-card" style="margin-bottom:12px;padding:14px;border:1px solid ' + color + '44;background:' + color + '08;cursor:pointer" data-hall="' + h + '" onclick="scrollToHall(\'' + h + '\')">';
      // Hall header
      html += '<div class="hall-header" style="margin-bottom:10px">';
      html += '<span class="hall-name" style="color:' + color + '">' + h + '</span>';
      html += '<div class="hall-badges">';
      html += '<span class="tag ' + (info.type==='整车'?'tag-teal':'tag-blue') + '">' + (info.type||'') + '</span>';
      html += '<span class="tag tag-amber">' + items.length + '款匹配</span>';
      html += '</div></div>';
      // Zone
      if(zoneName) html += '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">📍 ' + esc(zoneName) + '</div>';
      // Matched models preview
      html += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">';
      items.slice(0, 6).forEach(m => {
        html += '<span class="tag tag-green" style="font-size:11px">' + esc(m.v['品牌']) + ' ' + esc(m.v['车型']) + '</span>';
      });
      if(items.length > 6) html += '<span class="tag" style="background:var(--surface2);color:var(--text3);font-size:11px">+' + (items.length - 6) + '款</span>';
      html += '</div>';
      // Brand chips
      html += '<div style="display:flex;flex-wrap:wrap;gap:3px">';
      brands.slice(0, 5).forEach(b => {
        html += '<span style="font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:10px">' + esc(b) + '</span>';
      });
      if(brands.length > 5) html += '<span style="font-size:11px;color:var(--text3)">+' + (brands.length - 5) + '</span>';
      html += '</div>';
      html += '</div>';
    });
  }
  html += '</div>';
  resultsEl.innerHTML = html;
}

function clearT4Search() {
  document.getElementById('t4_search').value = '';
  document.getElementById('t4_results').innerHTML = '';
  document.querySelectorAll('.hall-card').forEach(c => { c.classList.remove('dimmed','matched'); });
}

// Scroll to a hall card in the halls grid and highlight it
function scrollToHall(hid) {
  // Find the target hall card in the halls grid (not in search results)
  const targetCard = document.querySelector('#t4_halls .hall-card[data-hall="' + hid + '"]');
  if(!targetCard) {
    // Fallback: open full-screen overlay if card not found
    openFS(hid);
    return;
  }

  // Remove any existing highlight
  document.querySelectorAll('.hall-card').forEach(c => { c.classList.remove('dimmed','matched'); });

  // Highlight the target card
  targetCard.classList.add('matched');
  targetCard.style.transition = 'box-shadow 0.5s ease';
  targetCard.style.boxShadow = '0 0 0 3px ' + (ZONE_COLORS_MAP[hid[0]] || '#06b6d4') + ', 0 8px 32px rgba(0,0,0,0.12)';

  // Smooth scroll to the card
  targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

  // Clear the highlight after 3 seconds
  setTimeout(() => {
    targetCard.classList.remove('matched');
    targetCard.style.boxShadow = '';
  }, 3000);
}

function renderHalls() {
  const wrap = document.getElementById('t4_halls');
  let html = '';
  for(const [zoneName, halls] of Object.entries(ZONE_NAMES)) {
    const zoneColor = ZONE_COLORS_MAP[halls[0][0]];
    html += '<div class="zone-section"><div class="zone-title"><span class="dot" style="background:'+zoneColor+'"></span>' + esc(zoneName) + '</div><div class="hall-grid">';
    halls.forEach(hid => {
      const brands = HALL_BRANDS[hid] || [];
      const info = HALL_INFO[hid] || {};
      const isVehicle = info.type === '整车';
      const vehicles = VEHICLES.filter(v => v._hall === hid);
      const color = ZONE_COLORS_MAP[hid[0]];
      const imgSrc = HALL_IMAGES[hid] || '';
      const brandStr = brands.join(',');
      // Also include model names in searchable data
      const modelsInHall = vehicles.map(v => v['车型']).join(',');

      html += '<div class="hall-card" data-brands="' + esc(brandStr) + '" data-models="' + esc(modelsInHall) + '" data-hall="' + hid + '" onclick="openFS(\''+hid+'\')">' +
        '<div class="hall-header"><span class="hall-name" style="color:'+color+'">' + hid + '</span>' +
        '<div class="hall-badges"><span class="tag ' + (isVehicle?'tag-teal':'tag-blue') + '">' + (isVehicle?'整车馆':info.type||'') + '</span>' +
        (vehicles.length ? '<span class="tag tag-amber">' + vehicles.length + '款</span>' : '') +
        '</div></div>';

      if(imgSrc) {
        html += '<div class="hall-img-wrap"><img src="' + imgSrc + '" alt="' + hid + '展位图" loading="lazy"></div>';
      }

      html += '<div class="hall-brands">';
      brands.slice(0,4).forEach(b => {
        html += '<span class="tag tag-green">' + esc(b) + '</span>';
      });
      if(brands.length > 4) html += '<span class="tag" style="background:var(--surface2);color:var(--text3)">+'+(brands.length-4)+'</span>';
      if(!brands.length) html += '<span class="tag" style="background:var(--surface2);color:var(--text3)">暂无品牌</span>';
      html += '</div></div>';
    });
    html += '</div></div>';
  }
  wrap.innerHTML = html;
}

function openFS(hid) {
  const brands = HALL_BRANDS[hid] || [];
  const info = HALL_INFO[hid] || {};
  const color = ZONE_COLORS_MAP[hid[0]];
  const imgSrc = HALL_IMAGES[hid] || '';
  const vehicles = VEHICLES.filter(v => v._hall === hid);

  let html = '<h2 style="color:'+color+'">' + hid + ' ' + (info.type==='整车'?'整车馆':info.type||'') + ' <span style="color:var(--text3);font-size:14px;font-weight:400;margin-left:8px">' + esc(info.zone||'') + '</span></h2>';

  if(imgSrc) html += '<img src="' + imgSrc + '" alt="' + hid + '展位图" style="margin:16px 0;border-radius:12px;width:100%;border:1px solid var(--border)">';

  if(brands.length) {
    html += '<div class="fs-brands">';
    brands.forEach(b => html += '<span class="tag tag-green" style="font-size:13px;padding:5px 14px">' + esc(b) + '</span>');
    html += '</div>';
  }

  if(vehicles.length) {
    html += '<h3 style="color:var(--text);margin-bottom:12px;margin-top:20px">参展车型 (' + vehicles.length + '款)</h3>';
    html += '<div class="fs-vehicles">';
    vehicles.forEach(v => {
      const idx = VEHICLES.indexOf(v);
      html += '<div class="fs-veh-card" onclick="showVehicleDetail('+idx+')">' +
        '<div class="fs-v-brand">' + esc(v['品牌']) + '</div>' +
        '<div class="fs-v-name">' + esc(v['车型']) + '</div>' +
        '<div class="fs-v-detail">' + esc(v['类别']||'') + ' · ' + esc(v['等级']||'') + '</div>' +
        '<div class="fs-v-detail">' + esc(v['核心看点']||'') + '</div>' +
        '<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">' +
          (v['动力类型']&&!isNA(v['动力类型'])?'<span class="tag tag-teal">'+esc(v['动力类型'])+'</span>':'') +
          (v['车展属性']?'<span class="tag tag-amber">'+esc(v['车展属性'])+'</span>':'') +
          (v['CLTC纯电续航(km)']&&!isNA(v['CLTC纯电续航(km)'])?'<span class="tag tag-green">'+esc(v['CLTC纯电续航(km)'])+'km</span>':'') +
          (v['官方售价(万元)']&&!isNA(v['官方售价(万元)'])?'<span class="tag tag-purple">'+esc(v['官方售价(万元)'])+'</span>':'') +
        '</div></div>';
    });
    html += '</div>';
  } else {
    html += '<div class="empty-msg" style="margin-top:20px">' + (info.type==='整车'?'暂无匹配车型数据':'此为零部件/技术馆') + '</div>';
  }

  document.getElementById('fsInner').innerHTML = html;
  document.getElementById('fsOverlay').classList.add('show');
}
